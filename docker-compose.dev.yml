version: "3.9"
# Local dev — only runs PostgreSQL in Docker.
# Run backend with: mvn spring-boot:run (uses H2 by default)
# Run frontend with: npm run dev

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: stp-postgres-dev
    environment:
      POSTGRES_DB: supportticketdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
