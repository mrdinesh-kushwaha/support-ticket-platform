spring:
  datasource:
    url: jdbc:h2:mem:supportdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

logging:
  level:
    com.supportticket: DEBUG
    org.hibernate.SQL: DEBUG

app:
  init:
    sample-data: true

app:
  jwt:
    secret: ${JWT_SECRET:MyVeryLongSecretKeyForJWTThatIsAtLeast256BitsLong_djbsdjb261!}
    expiration: 86400000
